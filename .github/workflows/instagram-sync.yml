name: Instagram Sync

on:
  schedule:
    - cron: '30 2 * * *' # daily ~08:00 IST
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: instagram-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sites/nathamuni-com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ffmpeg (story poster extraction)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Pull new reels from Instagram (and cross-post to YouTube if configured)
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: node scripts/instagram-sync.mjs

      - name: Commit and push if the library changed
        run: |
          if git diff --quiet; then
            echo "No changes — already in sync."
            exit 0
          fi
          git config user.name "instagram-sync[bot]"
          git config user.email "actions@github.com"
          git add lib/videos.json lib/stories.json public/images/thumbnails public/stories
          git commit -m "FEAT: auto-sync new reels from Instagram"
          git push
