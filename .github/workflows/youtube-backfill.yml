name: YouTube Backfill

on:
  workflow_dispatch:
    inputs:
      count:
        description: 'How many of the most recent reels (without a YouTube upload yet) to cross-post'
        required: false
        default: '2'

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sites/nathamuni-com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Backfill reels to YouTube
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_PRIVACY: ${{ vars.YOUTUBE_PRIVACY }}
          BACKFILL_COUNT: ${{ github.event.inputs.count }}
        run: node scripts/youtube-backfill.mjs

      - name: Commit and push if videos.json changed
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          git config user.name "youtube-backfill[bot]"
          git config user.email "actions@github.com"
          git add lib/videos.json
          git commit -m "CHORE: backfill YouTube cross-post for recent reels"
          git push
