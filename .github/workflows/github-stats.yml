name: GitHub Stats

on:
  schedule:
    - cron: '30 3 * * 1' # Mondays 03:30 UTC (~09:00 IST)
  workflow_dispatch:

jobs:
  stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: sites/nathamuni-com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Refresh GitHub stats snapshot
        run: node scripts/github-stats.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/github.json
          git diff --cached --quiet || (git commit -m "CHORE: weekly GitHub stats refresh" && git push)
